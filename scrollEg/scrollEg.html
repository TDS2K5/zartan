<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3D Scroll Magic</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        overflow-x: hidden;
        background-color: #0d1117; /* Dark background */
      }

      /* 1. The Canvas stays locked to the background */
      #webgl-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
      }

      /* 2. Normal HTML sections that we actually scroll through */
      section {
        height: 100vh; /* Each section takes up the full screen height */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <canvas id="webgl-canvas"></canvas>

    <section><h1>Scroll </h1></section>
    <section><h1>It's an illusion</h1></section>
    <section><h1>Now is the future</h1></section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
      // --- PART 1: SETUP THE 3D SCENE ---
      const canvas = document.querySelector("#webgl-canvas");
      const scene = new THREE.Scene();

      // Setup Camera & Renderer
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.position.z = 5;

      // Create a cool 3D shape (A Torus Knot)
      const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
      // Wireframe material so it looks high-tech
      const material = new THREE.MeshBasicMaterial({
        color: 0x00ffcc,
        wireframe: true,
      });
      const shape = new THREE.Mesh(geometry, material);
      scene.add(shape);

      // Keep the shape spinning slightly all the time (Idle animation)
      function animate() {
        requestAnimationFrame(animate);
        shape.rotation.x += 0.002;
        shape.rotation.y += 0.002;
        renderer.render(scene, camera);
      }
      animate();

      // --- PART 2: THE GSAP SCROLL MAGIC ---
      gsap.registerPlugin(ScrollTrigger);

      // Create a timeline linked to the whole page scroll
      let tl = gsap.timeline({
        scrollTrigger: {
          trigger: "body", // Watch the entire body for scrolling
          start: "top top", // Start when the top of the body hits the top of the screen
          end: "bottom bottom", // End when the bottom hits the bottom
          scrub: 1, // 'Scrub' ties the animation directly to the scrollbar.
          // The '1' adds a 1-second smoothing delay so it feels buttery!
        },
      });

      // Animate the 3D shape's properties as the user scrolls!
      tl.to(shape.rotation, { x: Math.PI * 2, y: Math.PI * 2 }) // Spin it fully around
        .to(shape.position, { x: 3, z: -2 }, 0) // Move it to the right and push it back
        .to(material.color, { r: 1, g: 0, b: 0.5 }, 0) // Change color to pink mid-scroll
        .to(shape.scale, { x: 2, y: 2, z: 2 }, 0); // Double its size
    </script>
  </body>
</html>
